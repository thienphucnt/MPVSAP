name: Daily Shorts Generator & Uploader

on:
  schedule:
    # Runs every 4 hours (6 times a day)
    - cron: '0 */4 * * *'

  workflow_dispatch: # Allows manual run for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevent hung renders consuming the full 6-hour limit

    # Required permissions to commit and push heartbeat.txt back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt  # Deterministic cache key tied to exact deps

      - name: Cache HuggingFace Models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-faster-whisper-base
          restore-keys: |
            ${{ runner.os }}-huggingface-

      - name: Cache Piper Models
        uses: actions/cache@v3
        with:
          path: models
          key: ${{ runner.os }}-piper-models-v1


      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          
          # Fix ImageMagick security policies that restrict TextClip label/path operations
          echo "Applying ImageMagick security policy patches..."
          if [ -f /etc/ImageMagick-6/policy.xml ]; then
            sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<!-- <policy domain="path" rights="none" pattern="@\*" -->/g' /etc/ImageMagick-6/policy.xml
            sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/g' /etc/ImageMagick-6/policy.xml
          fi
          if [ -f /etc/ImageMagick-7/policy.xml ]; then
            sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<!-- <policy domain="path" rights="none" pattern="@\*" -->/g' /etc/ImageMagick-7/policy.xml
            sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/g' /etc/ImageMagick-7/policy.xml
          fi

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Video Pipeline & Publish
        env:
          # Core API Keys
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          AFFILIATE_LINK: ${{ secrets.AFFILIATE_LINK }}

          # YouTube Data API Credentials
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_PLAYLIST_SPACE: ${{ secrets.YT_PLAYLIST_SPACE }}
          YT_PLAYLIST_HISTORY: ${{ secrets.YT_PLAYLIST_HISTORY }}
          YT_PLAYLIST_TECH: ${{ secrets.YT_PLAYLIST_TECH }}

          # TikTok Content Posting API Credentials
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}

          # Meta Graph API Credentials (Instagram & Facebook Reels)
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          python main.py
